<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Of The Kongo — Owned Media Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #4a4a4a;
  --orange: #f04e23;
  --orange2: #d43d16;
  --navy: #3d4f6b;
  --navy2: #2e3d55;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-lg: 14px;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* TOP BAR */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 100;
}
.logos-left { display: flex; align-items: center; gap: 20px; }
.logo-kongo { height: 32px; filter: invert(1); }
.divider-v { width: 1px; height: 28px; background: var(--border2); }
.logo-weare { height: 36px; }
.top-right { display: flex; align-items: center; gap: 12px; }
.last-update { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.btn-refresh {
  font-family: var(--font); font-size: 13px; font-weight: 500;
  padding: 8px 18px; background: var(--orange); color: #fff;
  border: none; border-radius: var(--radius); cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-refresh:hover { background: var(--orange2); }
.btn-refresh:active { transform: scale(0.97); }

/* MAIN */
.main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

/* SECTION LABEL */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
}

/* FILTERS */
.filters-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 20px;
  margin-bottom: 20px;
}
.filters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  align-items: end;
}
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-group label { font-size: 11px; color: var(--text2); font-weight: 500; }
.filter-group select, .filter-group input[type=date] {
  font-family: var(--font); font-size: 13px;
  padding: 8px 10px; background: var(--bg3); color: var(--text);
  border: 1px solid var(--border2); border-radius: var(--radius);
  cursor: pointer; outline: none; transition: border-color 0.15s;
  width: 100%;
}
.filter-group select:focus, .filter-group input[type=date]:focus { border-color: var(--orange); }
.filter-group input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
.btn-clear {
  font-family: var(--font); font-size: 12px; font-weight: 500;
  padding: 8px 14px; background: transparent; color: var(--text2);
  border: 1px solid var(--border2); border-radius: var(--radius);
  cursor: pointer; transition: all 0.15s; white-space: nowrap; align-self: end;
}
.btn-clear:hover { border-color: var(--orange); color: var(--orange); }

/* METRICS */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.metric-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
  position: relative; overflow: hidden; transition: border-color 0.2s;
}
.metric-card:hover { border-color: var(--border2); }
.metric-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--card-accent, var(--orange));
}
.metric-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 8px; }
.metric-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.03em; line-height: 1; font-family: var(--mono); }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 5px; font-family: var(--mono); }

/* CHARTS */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 800px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
}
.chart-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

/* TABLE */
.table-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.table-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.record-count { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  padding: 9px 14px; text-align: left; font-weight: 600; font-size: 10px;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border); background: var(--bg2); white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 10px 14px; color: var(--text); white-space: nowrap; font-family: var(--mono); font-size: 12px; }
tbody td.label-col { font-family: var(--font); font-size: 13px; }

/* BADGES */
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.02em; display: inline-block; font-family: var(--font); }
.badge-auto { background: rgba(240,78,35,0.15); color: #f04e23; border: 1px solid rgba(240,78,35,0.3); }
.badge-push { background: rgba(61,79,107,0.3); color: #7a9eca; border: 1px solid rgba(61,79,107,0.5); }
.badge-onsite { background: rgba(45,212,160,0.12); color: #2dd4a0; border: 1px solid rgba(45,212,160,0.25); }
.badge-wpp { background: rgba(37,211,102,0.12); color: #25d366; border: 1px solid rgba(37,211,102,0.2); }
.badge-oneshot { background: rgba(255,255,255,0.05); color: #666; border: 1px solid rgba(255,255,255,0.08); }

/* STATES */
.loading-state { text-align: center; padding: 50px 20px; color: var(--text3); }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border2);
  border-top-color: var(--orange); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 50px 20px; color: #f04e23; font-size: 13px; }
.empty-state { text-align: center; padding: 36px; color: var(--text3); font-size: 13px; }

@media (max-width: 600px) {
  .top-bar, .main { padding-left: 16px; padding-right: 16px; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .logo-weare { height: 28px; }
}
</style>
</head>

      </table>
    </div>
  </div>

</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTcaPhhmrDKdKCyKDIXxxh4Yj1xfSvwdinrD1rRZz-9gHdmiO1Lv1V1EuAZzVHbnxMUir9HGTsmnVIy/pub?gid=153053484&single=true&output=csv';
const PROXIES = [
  'https://corsproxy.io/?url=' + encodeURIComponent(SHEET_URL),
  'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_URL),
  'https://thingproxy.freeboard.io/fetch/' + SHEET_URL,
];

let allData = [];
let chartTipo = null, chartCanal = null;

const TIPO_COLORS = {
  'Automatización': '#f04e23',
  'Noti Push': '#3d4f6b',
  'On Site': '#2dd4a0',
  'Wpp Marketing': '#25d366',
  'One Shot': '#444'
};

function getTipo(accion) {
  if (!accion) return 'One Shot';
  const a = accion.toLowerCase();
  if (a.includes('automatizac')) return 'Automatización';
  if (a.includes('push') || a.includes('noti')) return 'Noti Push';
  if (a.includes('on site')) return 'On Site';
  if (a.includes('wpp')) return 'Wpp Marketing';
  return 'One Shot';
}

function getMes(fecha) {
  if (!fecha) return '';
  const parts = fecha.split('/');
  if (parts.length < 3) return fecha;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[parseInt(parts[1]) - 1] || fecha;
}

function parseDateArg(fecha) {
  if (!fecha) return null;
  const p = fecha.split('/');
  if (p.length < 3) return null;
  return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
}

function getSemana(fecha) {
  const d = parseDateArg(fecha);
  if (!d) return '';
  const day = d.getDate();
  if (day <= 7) return 'Semana 1';
  if (day <= 14) return 'Semana 2';
  if (day <= 21) return 'Semana 3';
  return 'Semana 4';
}

function parseNum(v) {
  if (!v || v === '#DIV/0!' || v === '-') return null;
  const clean = v.toString().replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'');
  const n = parseFloat(clean);
  return isNaN(n) ? null : n;
}

function fmtPesos(n) {
  if (n === null || n === undefined) return '-';
  return '$' + Math.round(n).toLocaleString('es-AR');
}
function fmtNum(n) {
  if (n === null || n === undefined) return '-';
  return Math.round(n).toLocaleString('es-AR');
}
function fmtPct(v) {
  if (!v || v === '#DIV/0!' || v === '-') return '-';
  const n = parseFloat(v.toString().replace(',','.').replace('%',''));
  return isNaN(n) ? '-' : n.toFixed(1) + '%';
}

function badgeClass(tipo) {
  const map = {'Automatización':'auto','Noti Push':'push','On Site':'onsite','Wpp Marketing':'wpp','One Shot':'oneshot'};
  return 'badge badge-' + (map[tipo] || 'oneshot');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur);
    const row = {};
    headers.forEach((h,i) => { row[h] = (cols[i]||'').trim().replace(/^"|"$/g,''); });
    return row;
  }).filter(r => r['Fecha'] && r['Fecha'].trim().length > 0 && r['Fecha'] !== 'Fecha');
}

function clearFilters() {
  ['filtroMes','filtroTipo','filtroCanal','filtroSemana'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('filtroDesde').value = '';
  document.getElementById('filtroHasta').value = '';
  render();
}

function getFiltered() {
  const mes = document.getElementById('filtroMes').value;
  const tipo = document.getElementById('filtroTipo').value;
  const canal = document.getElementById('filtroCanal').value;
  const desde = document.getElementById('filtroDesde').value;
  const hasta = document.getElementById('filtroHasta').value;
  const semana = document.getElementById('filtroSemana').value;

  return allData.filter(r => {
    if (mes && r._mes !== mes) return false;
    if (tipo && r._tipo !== tipo) return false;
    if (canal && r['Canal'] !== canal) return false;
    if (semana && r._semana !== semana) return false;
    if (desde || hasta) {
      const d = parseDateArg(r['Fecha']);
      if (!d) return false;
      if (desde && d < new Date(desde)) return false;
      if (hasta && d > new Date(hasta + 'T23:59:59')) return false;
    }
    return true;
  });
}

function render() {
  const data = getFiltered();

  const totalFact = data.reduce((s,r) => s+(parseNum(r['Facturacion'])||0),0);
  const totalSes = data.reduce((s,r) => s+(parseNum(r['Sesiones'])||0),0);
  const totalOrd = data.reduce((s,r) => s+(parseNum(r['Ordenes'])||0),0);
  const totalEnv = data.reduce((s,r) => s+(parseNum(r['Envios'])||0),0);
  const totalAper = data.reduce((s,r) => s+(parseNum(r['Aperturas'])||0),0);
  const totalClicks = data.reduce((s,r) => s+(parseNum(r['Clicks'])||0),0);
  const tickets = data.map(r=>parseNum(r['Ticket promedio'])).filter(v=>v!==null);
  const avgTicket = tickets.length ? tickets.reduce((a,b)=>a+b,0)/tickets.length : null;
  const ors = data.map(r=>{
    const v = r['Open Rate']; if(!v||v==='#DIV/0!') return null;
    return parseFloat(v.replace('%','').replace(',','.'));
  }).filter(v=>v!==null);
  const avgOR = ors.length ? ors.reduce((a,b)=>a+b,0)/ors.length : null;

  const cards = [
    {label:'Facturación', value:fmtPesos(totalFact), sub:data.length+' acciones', accent:'#f04e23'},
    {label:'Sesiones', value:fmtNum(totalSes), sub:'', accent:'#3d4f6b'},
    {label:'Órdenes', value:fmtNum(totalOrd), sub:'', accent:'#f04e23'},
    {label:'Ticket promedio', value:fmtPesos(avgTicket), sub:'promedio', accent:'#3d4f6b'},
    {label:'Envíos', value:fmtNum(totalEnv), sub:'', accent:'#f04e23'},
    {label:'Aperturas', value:fmtNum(totalAper), sub:'', accent:'#3d4f6b'},
    {label:'Clicks', value:fmtNum(totalClicks), sub:'', accent:'#f04e23'},
    {label:'Open Rate prom.', value:avgOR!==null?avgOR.toFixed(1)+'%':'-', sub:'', accent:'#3d4f6b'},
  ];

  document.getElementById('metrics-grid').innerHTML = cards.map(c=>`
    <div class="metric-card" style="--card-accent:${c.accent}">
      <div class="metric-label">${c.label}</div>
      <div class="metric-value">${c.value}</div>
      ${c.sub?`<div class="metric-sub">${c.sub}</div>`:''}
    </div>
  `).join('');

  const tipos = ['Automatización','Noti Push','On Site','Wpp Marketing','One Shot'];
  const factPorTipo = tipos.map(t=>data.filter(r=>r._tipo===t).reduce((s,r)=>s+(parseNum(r['Facturacion'])||0),0));

  if (chartTipo) chartTipo.destroy();
  chartTipo = new Chart(document.getElementById('chartTipo'), {
    type:'bar',
    data:{labels:tipos, datasets:[{data:factPorTipo, backgroundColor:tipos.map(t=>TIPO_COLORS[t]), borderRadius:4, borderSkipped:false}]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false}, ticks:{color:'#4a4a4a', font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#4a4a4a', font:{size:10}, callback:v=>v>=1000000?'$'+(v/1000000).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v}}
      }
    }
  });

  const canales = [...new Set(data.map(r=>r['Canal']).filter(Boolean))];
  const factPorCanal = canales.map(c=>data.filter(r=>r['Canal']===c).reduce((s,r)=>s+(parseNum(r['Facturacion'])||0),0));
  const cColors = ['#f04e23','#3d4f6b','#2dd4a0','#f5a623','#7a9eca','#25d366','#888','#c0392b'];

  if (chartCanal) chartCanal.destroy();
  chartCanal = new Chart(document.getElementById('chartCanal'), {
    type:'doughnut',
    data:{labels:canales, datasets:[{data:factPorCanal, backgroundColor:cColors.slice(0,canales.length), borderWidth:0, hoverOffset:6}]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true, position:'right', labels:{color:'#888', font:{size:11}, boxWidth:10, padding:10}}},
      cutout:'65%'
    }
  });

  document.getElementById('record-count').textContent = data.length + ' registros';
  const tbody = document.getElementById('tabla-body');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14"><div class="empty-state">Sin datos para los filtros seleccionados</div></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r=>`
    <tr>
      <td>${r['Fecha']||'-'}</td>
      <td class="label-col">${r['Acción']||r['Accion']||'-'}</td>
      <td class="label-col">${r['Canal']||'-'}</td>
      <td><span class="${badgeClass(r._tipo)}">${r._tipo}</span></td>
      <td>${r['Facturacion']?fmtPesos(parseNum(r['Facturacion'])):'-'}</td>
      <td>${r['Sesiones']?fmtNum(parseNum(r['Sesiones'])):'-'}</td>
      <td>${r['Ordenes']?fmtNum(parseNum(r['Ordenes'])):'-'}</td>
      <td>${fmtPct(r['CR'])}</td>
      <td>${r['Ticket promedio']?fmtPesos(parseNum(r['Ticket promedio'])):'-'}</td>
      <td>${r['Envios']?fmtNum(parseNum(r['Envios'])):'-'}</td>
      <td>${r['Aperturas']?fmtNum(parseNum(r['Aperturas'])):'-'}</td>
      <td>${fmtPct(r['Open Rate'])}</td>
      <td>${r['Clicks']?fmtNum(parseNum(r['Clicks'])):'-'}</td>
      <td>${fmtPct(r['CTOR'])}</td>
    </tr>
  `).join('');
}

async function loadData() {
  document.getElementById('metrics-grid').innerHTML = '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><div>Cargando datos...</div></div>';
  document.getElementById('tabla-body').innerHTML = '<tr><td colspan="14"><div class="loading-state"><div class="spinner"></div></div></td></tr>';
  document.getElementById('last-update').textContent = 'Actualizando...';

  try {
    let text = null, lastErr = '';
    for (const proxyUrl of PROXIES) {
      try {
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const t = await res.text();
        if (t && t.length > 10) { text = t; break; }
      } catch(e) { lastErr = e.message; continue; }
    }
    if (!text) throw new Error('Sin conexión al Sheets (' + lastErr + ')');

    const parsed = parseCSV(text);
    allData = parsed.map(r => ({
      ...r,
      _tipo: getTipo(r['Acción']||r['Accion']||''),
      _mes: getMes(r['Fecha']),
      _semana: getSemana(r['Fecha'])
    }));

    const meses = [...new Set(allData.map(r=>r._mes))].filter(Boolean);
    const canales = [...new Set(allData.map(r=>r['Canal']))].filter(Boolean);
    const semanas = ['Semana 1','Semana 2','Semana 3','Semana 4'];

    const selMes = document.getElementById('filtroMes');
    const prevMes = selMes.value;
    selMes.innerHTML = '<option value="">Todos los meses</option>' + meses.map(m=>`<option value="${m}">${m}</option>`).join('');
    if (prevMes) selMes.value = prevMes;

    const selCanal = document.getElementById('filtroCanal');
    const prevCanal = selCanal.value;
    selCanal.innerHTML = '<option value="">Todos los canales</option>' + canales.map(c=>`<option value="${c}">${c}</option>`).join('');
    if (prevCanal) selCanal.value = prevCanal;

    const selSemana = document.getElementById('filtroSemana');
    selSemana.innerHTML = '<option value="">Todas las semanas</option>' + semanas.map(s=>`<option value="${s}">${s}</option>`).join('');

    document.getElementById('last-update').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('metrics-grid').innerHTML = `<div class="error-state" style="grid-column:1/-1">No se pudieron cargar los datos.<br><small style="color:#444;margin-top:8px;display:block">${e.message}</small></div>`;
    document.getElementById('last-update').textContent = 'Error al cargar';
  }
}

loadData();
</script>
</body>
</html>
